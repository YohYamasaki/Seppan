name: seppan
description: "割り勘・立て替え管理アプリ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.9.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.5

  # UI utilities
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  gap: ^3.0.1

  # Encryption
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_analytics: ^11.4.4

  # Charts
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_foreground: "assets/icon_android.png"
  adaptive_icon_background: "#D98B00"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/avatar_icons/
    - assets/logos/
